<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Evaluation – Strategic Assistant MBMTH</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --bg-subtle: #f8f9fb;
            --surface: #ffffff;
            --surface-hover: #fafbfc;
            --border: #e4e7ec;
            --border-light: #f0f2f5;
            --text: #0f1728;
            --text-secondary: #475467;
            --text-muted: #98a2b3;
            --accent: #1570ef;
            --accent-light: #eff8ff;
            --accent-dark: #1849a9;
            --success: #12b76a;
            --success-light: #ecfdf3;
            --warning: #f79009;
            --warning-light: #fffaeb;
            --danger: #f04438;
            --danger-light: #fef3f2;
            --purple: #7a5af8;
            --score-1: #f04438;
            --score-2: #ef6820;
            --score-3: #eaaa08;
            --score-4: #17b26a;
            --score-5: #0e9f6e;
            --shadow-xs: 0 1px 2px rgba(16,24,40,0.05);
            --shadow-sm: 0 1px 3px rgba(16,24,40,0.1), 0 1px 2px rgba(16,24,40,0.06);
            --shadow-md: 0 4px 8px -2px rgba(16,24,40,0.1), 0 2px 4px -2px rgba(16,24,40,0.06);
            --shadow-lg: 0 12px 16px -4px rgba(16,24,40,0.08), 0 4px 6px -2px rgba(16,24,40,0.03);
            --shadow-xl: 0 20px 24px -4px rgba(16,24,40,0.08), 0 8px 8px -4px rgba(16,24,40,0.03);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Header ─── */
        .header {
            background: linear-gradient(135deg, #0f1728 0%, #1849a9 50%, #1570ef 100%);
            color: #fff;
            padding: 0 48px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .logo-mark {
            width: 38px; height: 38px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 13px; letter-spacing: 0.5px;
        }

        .header-title {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header-subtitle {
            font-size: 0.72rem;
            opacity: 0.6;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        /* ─── Navigation ─── */
        .nav-wrapper {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 72px;
            z-index: 90;
        }

        .nav {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            padding: 0 48px;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .nav::-webkit-scrollbar { display: none; }

        .nav button {
            padding: 16px 20px;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--transition);
            white-space: nowrap;
            position: relative;
        }

        .nav button:hover { color: var(--text-secondary); }

        .nav button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .nav button .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
        }

        .nav button .badge.complete { background: var(--success); }
        .nav button .badge.partial { background: var(--warning); }

        .nav .nav-divider {
            width: 1px;
            background: var(--border);
            margin: 10px 8px;
        }

        /* ─── Main ─── */
        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 48px 60px;
        }

        /* ─── Observer Bar ─── */
        .observer-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px 32px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
        }

        .observer-icon {
            width: 44px; height: 44px;
            background: var(--accent-light);
            border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent);
            flex-shrink: 0;
        }

        .observer-bar .field-group { flex: 1; }

        .observer-bar label {
            display: block;
            font-weight: 700;
            font-size: 0.82rem;
            margin-bottom: 6px;
            color: var(--text);
        }

        .observer-bar .field-hint {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 0;
        }

        .input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--text);
            background: var(--surface);
            transition: all var(--transition);
        }

        .input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(21,112,239,0.12);
        }

        .input::placeholder { color: var(--text-muted); }

        /* ─── Buttons ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border: 1.5px solid transparent;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-secondary);
            border-color: var(--border);
        }
        .btn-secondary:hover { background: var(--bg-subtle); }

        .btn-danger {
            background: var(--danger-light);
            color: var(--danger);
            border-color: transparent;
        }
        .btn-danger:hover { background: #fee4e2; }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            padding: 8px 12px;
        }
        .btn-ghost:hover { background: var(--bg-subtle); }

        /* ─── Sections ─── */
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Card ─── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-xs);
            transition: box-shadow var(--transition);
        }

        .card:hover { box-shadow: var(--shadow-sm); }

        .card-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h2 {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .card-body { padding: 24px 28px; }

        /* ─── Candidate Name ─── */
        .candidate-name-group {
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-light);
        }

        .candidate-name-group label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .candidate-name-input {
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            width: 360px;
            max-width: 100%;
            color: var(--text);
            transition: all var(--transition);
        }

        .candidate-name-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(21,112,239,0.12);
        }

        /* ─── Category Group Label ─── */
        .category-group-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 16px 0 8px;
            border-bottom: 2px solid var(--border-light);
            margin-bottom: 4px;
        }

        /* ─── Category Row ─── */
        .category-row {
            display: grid;
            grid-template-columns: 260px auto 1fr;
            gap: 24px;
            align-items: start;
            padding: 18px 0;
            border-bottom: 1px solid var(--border-light);
            transition: background var(--transition);
        }

        .category-row:hover { background: var(--bg-subtle); margin: 0 -28px; padding-left: 28px; padding-right: 28px; }
        .category-row:last-child { border-bottom: none; }

        .category-info h3 {
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 3px;
            color: var(--text);
        }

        .category-info p {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.45;
        }

        /* ─── Rating Pills ─── */
        .rating-pills {
            display: flex;
            gap: 5px;
            padding-top: 1px;
        }

        .rating-pills .pill {
            width: 38px; height: 34px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            color: var(--text-muted);
            background: var(--surface);
            user-select: none;
        }

        .rating-pills .pill:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .rating-pills .pill.selected {
            color: #fff;
            border-color: transparent;
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .rating-pills .pill.selected[data-value="1"] { background: var(--score-1); }
        .rating-pills .pill.selected[data-value="2"] { background: var(--score-2); }
        .rating-pills .pill.selected[data-value="3"] { background: var(--score-3); }
        .rating-pills .pill.selected[data-value="4"] { background: var(--score-4); }
        .rating-pills .pill.selected[data-value="5"] { background: var(--score-5); }

        .comment-field {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.78rem;
            color: var(--text);
            resize: vertical;
            min-height: 36px;
            transition: all var(--transition);
            background: var(--surface);
        }

        .comment-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(21,112,239,0.12);
        }

        .comment-field::placeholder { color: var(--text-muted); }

        /* ─── Overall Comment ─── */
        .overall-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px solid var(--border-light);
        }

        .overall-section label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .overall-section .field-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .overall-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.82rem;
            color: var(--text);
            resize: vertical;
            min-height: 80px;
            transition: all var(--transition);
        }

        .overall-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(21,112,239,0.12);
        }

        /* ─── Actions Bar ─── */
        .actions-bar {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        /* ─── Summary ─── */
        .summary-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px 28px;
            box-shadow: var(--shadow-xs);
        }

        .summary-card h3 {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        /* ─── Ranking Table ─── */
        .ranking-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .ranking-table th {
            text-align: left;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }

        .ranking-table td {
            padding: 14px;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.85rem;
        }

        .ranking-table tbody tr { transition: background var(--transition); }
        .ranking-table tbody tr:hover { background: var(--bg-subtle); }
        .ranking-table tr:last-child td { border-bottom: none; }

        .rank-badge {
            width: 30px; height: 30px;
            border-radius: var(--radius-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.78rem;
        }

        .rank-1 { background: linear-gradient(135deg, #fde68a, #fbbf24); color: #92400e; }
        .rank-2 { background: linear-gradient(135deg, #e5e7eb, #d1d5db); color: #374151; }
        .rank-3 { background: linear-gradient(135deg, #fed7aa, #fdba74); color: #9a3412; }
        .rank-4 { background: var(--bg); color: var(--text-muted); }

        /* ─── Score Bars ─── */
        .score-bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .score-bar-label {
            font-size: 0.72rem;
            font-weight: 600;
            width: 200px;
            flex-shrink: 0;
            color: var(--text-secondary);
        }

        .score-bar-track {
            flex: 1;
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .score-bar-value {
            font-size: 0.72rem;
            font-weight: 800;
            width: 32px;
            text-align: right;
        }

        /* ─── Chart ─── */
        .chart-container {
            position: relative;
            width: 100%;
            max-height: 380px;
            padding: 8px 0;
        }

        /* ─── Observer Entry ─── */
        .observer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .observer-row:last-child { border-bottom: none; }

        .observer-row .obs-name {
            font-weight: 700;
            font-size: 0.82rem;
        }

        .observer-row .obs-time {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ─── Comment Items ─── */
        .comments-section { margin-top: 24px; }

        .comments-section h4 {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .comment-bubble {
            background: var(--bg-subtle);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 10px;
            transition: box-shadow var(--transition);
        }

        .comment-bubble:hover { box-shadow: var(--shadow-sm); }

        .comment-bubble .cb-meta {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        .comment-bubble .cb-text {
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .comment-bubble.highlight {
            border-left: 3px solid var(--accent);
            background: var(--accent-light);
        }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: var(--text);
            color: #fff;
            padding: 12px 22px;
            border-radius: var(--radius);
            font-size: 0.82rem;
            font-weight: 600;
            box-shadow: var(--shadow-xl);
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .toast.show { transform: translateY(0); opacity: 1; }

        /* ─── No data ─── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state .empty-icon {
            width: 64px; height: 64px;
            background: var(--bg);
            border-radius: var(--radius-lg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            color: var(--text-muted);
            font-size: 28px;
        }

        .empty-state h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .empty-state p {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        /* ─── Responsive ─── */
        @media (max-width: 960px) {
            .header { padding: 0 24px; }
            .nav { padding: 0 24px; }
            .main { padding: 20px 24px 60px; }
            .category-row { grid-template-columns: 1fr; gap: 10px; }
            .category-row:hover { margin: 0; padding-left: 0; padding-right: 0; }
            .summary-hero { grid-template-columns: 1fr; }
            .candidate-name-input { width: 100%; }
            .score-bar-label { width: 140px; }
        }

        @media (max-width: 640px) {
            .header { padding: 0 16px; height: 60px; }
            .header-title { font-size: 0.9rem; }
            .nav { padding: 0 16px; }
            .main { padding: 16px; }
            .observer-bar { flex-direction: column; align-items: stretch; padding: 20px; }
            .observer-icon { display: none; }
        }

        /* ─── Print ─── */
        @media print {
            .header, .nav-wrapper, .observer-bar, .actions-bar, .btn { display: none !important; }
            .section { display: block !important; }
            .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="logo-mark">MB</div>
        <div>
            <div class="header-title">Interview Evaluation Panel</div>
            <div class="header-subtitle">Strategic Assistant – Operational & Financial Excellence, MBMTH</div>
        </div>
    </div>
</div>

<div class="nav-wrapper">
    <div class="nav" id="nav">
        <button class="active" onclick="showSection('candidate1')">Candidate 1</button>
        <button onclick="showSection('candidate2')">Candidate 2</button>
        <button onclick="showSection('candidate3')">Candidate 3</button>
        <button onclick="showSection('candidate4')">Candidate 4</button>
        <div class="nav-divider"></div>
        <button onclick="showSection('summary')">Summary</button>
    </div>
</div>

<div class="main">
    <div class="observer-bar">
        <div class="observer-icon">
            <span class="material-symbols-outlined">person</span>
        </div>
        <div class="field-group">
            <label for="observerName">Observer</label>
            <p class="field-hint">Enter your name to begin your evaluation</p>
        </div>
        <input class="input" type="text" id="observerName" placeholder="Your full name..." style="max-width:320px" />
        <button class="btn btn-primary" onclick="setObserver()">Begin</button>
    </div>

    <div id="evaluationArea" style="display:none;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
    {
        id: 'strategic',
        name: 'Strategic Thinking & Transformation',
        desc: 'Ability to develop and execute strategic initiatives, build business cases, and drive transformation roadmaps.',
        group: 'core'
    },
    {
        id: 'analytical',
        name: 'Analytical & Problem-Solving Skills',
        desc: 'Structured thinking, data-driven analysis, ability to synthesize complex information into actionable insights.',
        group: 'core'
    },
    {
        id: 'operational',
        name: 'Operational & Financial Excellence',
        desc: 'Understanding of KPIs, cost structures, production efficiency, budgets, and performance management.',
        group: 'core'
    },
    {
        id: 'delivery',
        name: 'Ability to Deliver Results',
        desc: 'Track record of driving measurable outcomes, meeting deadlines, and achieving targets under pressure.',
        group: 'core'
    },
    {
        id: 'communication',
        name: 'Communication & Presentation',
        desc: 'Executive-level presentation skills, clarity in English and Thai, ability to prepare decision papers.',
        group: 'interpersonal'
    },
    {
        id: 'project',
        name: 'Project Management & Execution',
        desc: 'Cross-functional coordination, structured tracking and reporting, ownership mindset.',
        group: 'interpersonal'
    },
    {
        id: 'leadership',
        name: 'Leadership Potential',
        desc: 'Vision, initiative, ability to influence and guide others, strategic decision-making capability.',
        group: 'interpersonal'
    },
    {
        id: 'cultural_fit',
        name: 'Cultural Fit & Team Adaptability',
        desc: 'Professional integrity, discretion, maturity, ability to integrate into and collaborate with the existing team, alignment with company values.',
        group: 'fit'
    },
    {
        id: 'sustainability',
        name: 'Sustainability & ESG Awareness',
        desc: 'Knowledge of ESG frameworks, energy efficiency, CO2 reduction, environmental compliance.',
        group: 'fit'
    }
];

const GROUPS = {
    core: 'Core Competencies',
    interpersonal: 'Communication & Leadership',
    fit: 'Fit & Awareness'
};

const CANDIDATES = ['candidate1', 'candidate2', 'candidate3', 'candidate4'];
const CANDIDATE_LABELS = ['Candidate 1', 'Candidate 2', 'Candidate 3', 'Candidate 4'];
const COLORS = ['#1570ef', '#ef6820', '#17b26a', '#7a5af8'];

let currentSection = 'candidate1';
let observerName = '';

function getData() {
    const d = localStorage.getItem('mbmth_eval_data_v2');
    return d ? JSON.parse(d) : { observers: {} };
}

function saveData(data) {
    localStorage.setItem('mbmth_eval_data_v2', JSON.stringify(data));
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function setObserver() {
    const input = document.getElementById('observerName');
    const name = input.value.trim();
    if (!name) { showToast('Please enter your name'); return; }
    observerName = name;
    document.getElementById('evaluationArea').style.display = 'block';
    input.disabled = true;
    document.querySelector('.observer-bar .btn').textContent = 'Active';
    document.querySelector('.observer-bar .btn').disabled = true;
    document.querySelector('.observer-bar .btn').style.opacity = '0.5';
    buildSections();
    loadObserverData();
    showSection('candidate1');
    showToast('Welcome, ' + name);
}

function buildSections() {
    const area = document.getElementById('evaluationArea');
    let html = '';

    CANDIDATES.forEach((cid, ci) => {
        html += `<div class="section${ci === 0 ? ' active' : ''}" id="section-${cid}">`;
        html += `<div class="card"><div class="card-header"><h2>${CANDIDATE_LABELS[ci]}</h2></div>`;
        html += `<div class="card-body">`;

        html += `<div class="candidate-name-group">`;
        html += `<label>Candidate Name</label>`;
        html += `<input class="candidate-name-input" id="name-${cid}" placeholder="Enter candidate name..." oninput="autoSave()"/>`;
        html += `</div>`;

        let currentGroup = '';
        CATEGORIES.forEach(cat => {
            if (cat.group !== currentGroup) {
                currentGroup = cat.group;
                html += `<div class="category-group-label">${GROUPS[cat.group]}</div>`;
            }

            html += `<div class="category-row">`;
            html += `<div class="category-info"><h3>${cat.name}</h3><p>${cat.desc}</p></div>`;
            html += `<div class="rating-pills" id="stars-${cid}-${cat.id}">`;
            for (let i = 1; i <= 5; i++) {
                html += `<div class="pill" data-value="${i}" onclick="setRating('${cid}','${cat.id}',${i})">${i}</div>`;
            }
            html += `</div>`;
            html += `<textarea class="comment-field" id="comment-${cid}-${cat.id}" placeholder="Add comments..." oninput="autoSave()"></textarea>`;
            html += `</div>`;
        });

        html += `<div class="overall-section">`;
        html += `<label>Overall Assessment</label>`;
        html += `<p class="field-hint">Overall impression, recommendation, key strengths, concerns or red flags</p>`;
        html += `<textarea class="overall-textarea" id="overall-${cid}" placeholder="Write your overall assessment..." oninput="autoSave()"></textarea>`;
        html += `</div>`;

        html += `</div></div>`;
        html += `<div class="actions-bar">`;
        html += `<button class="btn btn-secondary" onclick="clearCandidate('${cid}')">Clear</button>`;
        html += `<button class="btn btn-primary" onclick="saveCandidate('${cid}')">Save Evaluation</button>`;
        html += `</div></div>`;
    });

    html += `<div class="section" id="section-summary"></div>`;
    area.innerHTML = html;
}

function setRating(cid, catId, value) {
    const container = document.getElementById(`stars-${cid}-${catId}`);
    container.querySelectorAll('.pill').forEach(s => {
        const v = parseInt(s.dataset.value);
        if (v <= value) s.classList.add('selected');
        else s.classList.remove('selected');
    });
    autoSave();
}

function getRating(cid, catId) {
    const container = document.getElementById(`stars-${cid}-${catId}`);
    if (!container) return 0;
    const selected = container.querySelectorAll('.pill.selected');
    return selected.length > 0 ? parseInt([...selected].pop().dataset.value) : 0;
}

function autoSave() {
    const data = getData();
    if (!observerName) return;
    if (!data.observers[observerName]) data.observers[observerName] = { timestamp: new Date().toISOString(), candidates: {} };

    CANDIDATES.forEach(cid => {
        const cData = { name: '', ratings: {}, comments: {}, overall: '' };
        const nameEl = document.getElementById(`name-${cid}`);
        if (nameEl) cData.name = nameEl.value;

        CATEGORIES.forEach(cat => {
            cData.ratings[cat.id] = getRating(cid, cat.id);
            const commentEl = document.getElementById(`comment-${cid}-${cat.id}`);
            if (commentEl) cData.comments[cat.id] = commentEl.value;
        });

        const overallEl = document.getElementById(`overall-${cid}`);
        if (overallEl) cData.overall = overallEl.value;
        data.observers[observerName].candidates[cid] = cData;
    });

    data.observers[observerName].timestamp = new Date().toISOString();
    saveData(data);
    updateTabIndicators();
}

function saveCandidate(cid) {
    autoSave();
    showToast('Evaluation saved');
}

function clearCandidate(cid) {
    if (!confirm('Clear all ratings and comments for this candidate?')) return;
    document.getElementById(`name-${cid}`).value = '';
    CATEGORIES.forEach(cat => {
        document.getElementById(`stars-${cid}-${cat.id}`).querySelectorAll('.pill').forEach(s => s.classList.remove('selected'));
        document.getElementById(`comment-${cid}-${cat.id}`).value = '';
    });
    document.getElementById(`overall-${cid}`).value = '';
    autoSave();
    showToast('Cleared');
}

function loadObserverData() {
    const data = getData();
    const obs = data.observers[observerName];
    if (!obs) return;

    CANDIDATES.forEach(cid => {
        const c = obs.candidates[cid];
        if (!c) return;
        const nameEl = document.getElementById(`name-${cid}`);
        if (nameEl && c.name) nameEl.value = c.name;

        CATEGORIES.forEach(cat => {
            if (c.ratings[cat.id]) setRating(cid, cat.id, c.ratings[cat.id]);
            const commentEl = document.getElementById(`comment-${cid}-${cat.id}`);
            if (commentEl && c.comments[cat.id]) commentEl.value = c.comments[cat.id];
        });

        const overallEl = document.getElementById(`overall-${cid}`);
        if (overallEl && c.overall) overallEl.value = c.overall;
    });

    updateTabIndicators();
}

function updateTabIndicators() {
    const data = getData();
    const obs = data.observers[observerName];
    const buttons = document.querySelectorAll('#nav button');

    CANDIDATES.forEach((cid, ci) => {
        let badge = buttons[ci].querySelector('.badge');
        if (!badge) {
            badge = document.createElement('span');
            badge.className = 'badge';
            buttons[ci].appendChild(badge);
        }

        if (!obs || !obs.candidates[cid]) { badge.className = 'badge'; return; }

        const c = obs.candidates[cid];
        const totalRatings = CATEGORIES.reduce((sum, cat) => sum + (c.ratings[cat.id] > 0 ? 1 : 0), 0);

        if (totalRatings === CATEGORIES.length) badge.className = 'badge complete';
        else if (totalRatings > 0) badge.className = 'badge partial';
        else badge.className = 'badge';
    });
}

function showSection(sectionId) {
    currentSection = sectionId;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));

    const idx = CANDIDATES.indexOf(sectionId);
    if (idx >= 0) {
        document.getElementById(`section-${sectionId}`).classList.add('active');
        document.querySelectorAll('#nav button')[idx].classList.add('active');
    } else if (sectionId === 'summary') {
        document.getElementById('section-summary').classList.add('active');
        // summary button is at index 5 (after divider)
        const btns = document.querySelectorAll('#nav button');
        btns[btns.length - 1].classList.add('active');
        buildSummary();
    }
}

function buildSummary() {
    const data = getData();
    const container = document.getElementById('section-summary');
    const observers = Object.keys(data.observers);

    if (observers.length === 0) {
        container.innerHTML = `<div class="empty-state">
            <div class="empty-icon"><span class="material-symbols-outlined">assessment</span></div>
            <h3>No evaluations yet</h3>
            <p>Complete at least one candidate evaluation to see the summary.</p>
        </div>`;
        return;
    }

    const candidateScores = {};
    const candidateNames = {};

    CANDIDATES.forEach(cid => {
        candidateScores[cid] = {};
        CATEGORIES.forEach(cat => {
            const ratings = [];
            observers.forEach(obs => {
                const c = data.observers[obs].candidates?.[cid];
                if (c && c.ratings[cat.id] > 0) ratings.push(c.ratings[cat.id]);
            });
            candidateScores[cid][cat.id] = ratings.length > 0 ? (ratings.reduce((a, b) => a + b, 0) / ratings.length) : 0;
        });

        observers.forEach(obs => {
            const c = data.observers[obs].candidates?.[cid];
            if (c && c.name) candidateNames[cid] = c.name;
        });
    });

    const overallAvg = {};
    CANDIDATES.forEach(cid => {
        const scores = Object.values(candidateScores[cid]).filter(v => v > 0);
        overallAvg[cid] = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
    });

    const ranked = [...CANDIDATES].sort((a, b) => overallAvg[b] - overallAvg[a]);

    function getCandidateLabel(cid) {
        return candidateNames[cid] || CANDIDATE_LABELS[CANDIDATES.indexOf(cid)];
    }

    function getScoreColor(score) {
        if (score >= 4.5) return 'var(--score-5)';
        if (score >= 3.5) return 'var(--score-4)';
        if (score >= 2.5) return 'var(--score-3)';
        if (score >= 1.5) return 'var(--score-2)';
        return 'var(--score-1)';
    }

    let html = '<div class="summary-hero">';

    // Ranking
    html += '<div class="summary-card"><h3>Candidate Ranking</h3>';
    html += '<table class="ranking-table"><thead><tr><th>Rank</th><th>Candidate</th><th>Avg Score</th><th>Evaluations</th></tr></thead><tbody>';
    ranked.forEach((cid, i) => {
        if (overallAvg[cid] === 0) return;
        const evalCount = observers.filter(obs => {
            const c = data.observers[obs].candidates?.[cid];
            return c && Object.values(c.ratings).some(r => r > 0);
        }).length;
        html += `<tr>
            <td><span class="rank-badge rank-${i + 1}">${i + 1}</span></td>
            <td style="font-weight:700">${getCandidateLabel(cid)}</td>
            <td><span style="font-weight:800;color:${getScoreColor(overallAvg[cid])}">${overallAvg[cid].toFixed(2)}</span><span style="color:var(--text-muted);font-size:0.75rem"> / 5</span></td>
            <td><span style="color:var(--text-secondary)">${evalCount} observer${evalCount !== 1 ? 's' : ''}</span></td>
        </tr>`;
    });
    html += '</tbody></table></div>';

    // Observers
    html += '<div class="summary-card"><h3>Observers</h3>';
    observers.forEach(obs => {
        const ts = new Date(data.observers[obs].timestamp);
        html += `<div class="observer-row">
            <span class="obs-name">${obs}</span>
            <span class="obs-time">${ts.toLocaleDateString()} ${ts.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
        </div>`;
    });
    html += `<div class="actions-bar" style="margin-top:16px;justify-content:flex-start">
        <button class="btn btn-secondary" onclick="exportData()">Export JSON</button>
        <button class="btn btn-danger" onclick="clearAllData()">Clear All Data</button>
    </div></div>`;
    html += '</div>';

    // Charts
    html += '<div class="card"><div class="card-header"><h2>Competency Comparison</h2></div>';
    html += '<div class="card-body"><div class="chart-container"><canvas id="radarChart"></canvas></div></div></div>';

    html += '<div class="card"><div class="card-header"><h2>Score Breakdown by Category</h2></div>';
    html += '<div class="card-body"><div class="chart-container"><canvas id="barChart"></canvas></div></div></div>';

    // Per-candidate detail
    CANDIDATES.forEach((cid, ci) => {
        if (overallAvg[cid] === 0) return;

        html += `<div class="card"><div class="card-header">`;
        html += `<h2><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${COLORS[ci]};margin-right:10px"></span>${getCandidateLabel(cid)}</h2>`;
        html += `<span style="font-size:1.6rem;font-weight:800;color:${getScoreColor(overallAvg[cid])}">${overallAvg[cid].toFixed(2)}</span></div>`;
        html += '<div class="card-body">';

        CATEGORIES.forEach(cat => {
            const score = candidateScores[cid][cat.id];
            const pct = (score / 5 * 100).toFixed(0);
            html += `<div class="score-bar-row">
                <span class="score-bar-label">${cat.name}</span>
                <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${getScoreColor(score)}"></div></div>
                <span class="score-bar-value" style="color:${getScoreColor(score)}">${score > 0 ? score.toFixed(1) : '–'}</span>
            </div>`;
        });

        html += '<div class="comments-section"><h4>Comments from Observers</h4>';
        let hasComments = false;

        observers.forEach(obs => {
            const c = data.observers[obs].candidates?.[cid];
            if (!c) return;

            CATEGORIES.forEach(cat => {
                if (c.comments[cat.id] && c.comments[cat.id].trim()) {
                    hasComments = true;
                    html += `<div class="comment-bubble">
                        <div class="cb-meta">${obs} — ${cat.name}</div>
                        <div class="cb-text">${escapeHtml(c.comments[cat.id])}</div>
                    </div>`;
                }
            });

            if (c.overall && c.overall.trim()) {
                hasComments = true;
                html += `<div class="comment-bubble highlight">
                    <div class="cb-meta">${obs} — Overall Assessment</div>
                    <div class="cb-text">${escapeHtml(c.overall)}</div>
                </div>`;
            }
        });

        if (!hasComments) html += '<p style="color:var(--text-muted);font-size:0.78rem">No comments yet.</p>';
        html += '</div></div></div>';
    });

    container.innerHTML = html;

    setTimeout(() => {
        buildRadarChart(candidateScores, candidateNames, overallAvg);
        buildBarChart(candidateScores, candidateNames, overallAvg);
    }, 50);
}

function buildRadarChart(scores, names, overallAvg) {
    const ctx = document.getElementById('radarChart');
    if (!ctx) return;

    const datasets = [];
    CANDIDATES.forEach((cid, ci) => {
        if (overallAvg[cid] === 0) return;
        datasets.push({
            label: names[cid] || CANDIDATE_LABELS[ci],
            data: CATEGORIES.map(cat => scores[cid][cat.id]),
            borderColor: COLORS[ci],
            backgroundColor: COLORS[ci] + '18',
            borderWidth: 2.5,
            pointRadius: 4,
            pointBackgroundColor: COLORS[ci],
            pointBorderColor: '#fff',
            pointBorderWidth: 1.5
        });
    });

    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: CATEGORIES.map(c => {
                const words = c.name.split(' ');
                if (words.length <= 3) return c.name;
                const mid = Math.ceil(words.length / 2);
                return [words.slice(0, mid).join(' '), words.slice(mid).join(' ')];
            }),
            datasets
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                r: {
                    min: 0, max: 5,
                    ticks: { stepSize: 1, font: { size: 10, family: 'Plus Jakarta Sans' }, backdropColor: 'transparent' },
                    pointLabels: { font: { size: 10.5, family: 'Plus Jakarta Sans', weight: '600' }, color: '#475467' },
                    grid: { color: '#e4e7ec' },
                    angleLines: { color: '#e4e7ec' }
                }
            },
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 12, family: 'Plus Jakarta Sans', weight: '600' }, padding: 24, usePointStyle: true, pointStyle: 'rectRounded' } }
            }
        }
    });
}

function buildBarChart(scores, names, overallAvg) {
    const ctx = document.getElementById('barChart');
    if (!ctx) return;

    const datasets = [];
    CANDIDATES.forEach((cid, ci) => {
        if (overallAvg[cid] === 0) return;
        datasets.push({
            label: names[cid] || CANDIDATE_LABELS[ci],
            data: CATEGORIES.map(cat => scores[cid][cat.id]),
            backgroundColor: COLORS[ci] + 'CC',
            borderColor: COLORS[ci],
            borderWidth: 0,
            borderRadius: 6,
            borderSkipped: false
        });
    });

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: CATEGORIES.map(c => {
                const words = c.name.split(' ');
                if (words.length <= 2) return c.name;
                const mid = Math.ceil(words.length / 2);
                return [words.slice(0, mid).join(' '), words.slice(mid).join(' ')];
            }),
            datasets
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                y: {
                    min: 0, max: 5,
                    ticks: { stepSize: 1, font: { size: 11, family: 'Plus Jakarta Sans' } },
                    grid: { color: '#f0f2f5' }
                },
                x: {
                    ticks: { font: { size: 10, family: 'Plus Jakarta Sans', weight: '500' } },
                    grid: { display: false }
                }
            },
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 12, family: 'Plus Jakarta Sans', weight: '600' }, padding: 24, usePointStyle: true, pointStyle: 'rectRounded' } }
            }
        }
    });
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function clearAllData() {
    if (!confirm('This will permanently delete ALL evaluation data. Are you sure?')) return;
    if (!confirm('Really delete everything? This cannot be undone.')) return;
    localStorage.removeItem('mbmth_eval_data_v2');
    showToast('All data cleared');
    buildSummary();
}

function exportData() {
    const data = getData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `interview_evaluation_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Data exported');
}
</script>

</body>
</html>

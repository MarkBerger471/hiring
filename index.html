<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Evaluation – Strategic Assistant MBMTH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff8ff', 100: '#dbeafe', 500: '#1570ef', 600: '#1849a9', 700: '#0f1728', 800: '#0a0f1e' },
                        score: { 1: '#f04438', 2: '#ef6820', 3: '#eaaa08', 4: '#17b26a', 5: '#0e9f6e' }
                    }
                }
            }
        }
    </script>
    <style>
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .pill.selected { color: #fff !important; border-color: transparent !important; transform: translateY(-1px); }
        .pill.selected[data-value="1"] { background: #f04438; }
        .pill.selected[data-value="2"] { background: #ef6820; }
        .pill.selected[data-value="3"] { background: #eaaa08; }
        .pill.selected[data-value="4"] { background: #17b26a; }
        .pill.selected[data-value="5"] { background: #0e9f6e; }
        .rank-1 { background: linear-gradient(135deg, #fde68a, #fbbf24); color: #92400e; }
        .rank-2 { background: linear-gradient(135deg, #e5e7eb, #d1d5db); color: #374151; }
        .rank-3 { background: linear-gradient(135deg, #fed7aa, #fdba74); color: #9a3412; }
        .rank-4 { background: #f3f4f6; color: #9ca3af; }
        .badge { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-left: 6px; vertical-align: middle; }
        .badge.complete { background: #12b76a; }
        .badge.partial { background: #f79009; }
        .chart-radar { aspect-ratio: 1/1; max-width: 900px; margin: 0 auto; }
        /* Dark mode overrides */
        .dark .pill { background: #1e293b; border-color: #334155; color: #94a3b8; }
        .dark .pill:hover { border-color: #3b82f6; color: #3b82f6; }
        .dark .rank-4 { background: #1e293b; color: #64748b; }
        @media print {
            .no-print { display: none !important; }
            .section { display: block !important; }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 font-sans text-gray-900 dark:text-gray-100 antialiased transition-colors duration-300">

<!-- Header -->
<header class="relative overflow-hidden bg-gradient-to-br from-brand-800 via-brand-600 to-brand-500 text-white py-12 px-6 text-center">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_30%_50%,rgba(255,255,255,0.04),transparent_60%),radial-gradient(ellipse_at_70%_20%,rgba(255,255,255,0.06),transparent_50%)]"></div>
    <button onclick="toggleDark()" class="absolute top-4 right-6 z-20 w-10 h-10 rounded-xl bg-white/10 hover:bg-white/20 backdrop-blur flex items-center justify-center transition" title="Toggle dark mode">
        <span class="material-symbols-outlined text-white/70 text-xl dark-icon">dark_mode</span>
    </button>
    <div class="relative z-10">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-gradient-to-b from-white to-white/80 bg-clip-text text-transparent mb-2">Interview Evaluation Panel</h1>
        <p class="text-sm md:text-base text-white/50 font-medium tracking-widest uppercase">Strategic Assistant – Operational & Financial Excellence, MBMTH</p>
        <div class="w-12 h-0.5 bg-gradient-to-r from-white/60 to-white/10 rounded mx-auto mt-4"></div>
    </div>
    <div class="absolute bottom-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
</header>

<!-- Nav -->
<nav class="sticky top-0 z-50 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 no-print transition-colors">
    <div class="max-w-7xl mx-auto flex items-center gap-1 px-6 md:px-12 overflow-x-auto scrollbar-hide" id="nav">
        <button class="active px-5 py-4 text-sm font-semibold text-gray-400 dark:text-gray-500 border-b-2 border-transparent whitespace-nowrap transition-all hover:text-gray-600 dark:hover:text-gray-300 [&.active]:text-brand-500 [&.active]:border-brand-500" onclick="showSection('candidate1')">Krichasorn</button>
        <button class="px-5 py-4 text-sm font-semibold text-gray-400 dark:text-gray-500 border-b-2 border-transparent whitespace-nowrap transition-all hover:text-gray-600 dark:hover:text-gray-300 [&.active]:text-brand-500 [&.active]:border-brand-500" onclick="showSection('candidate2')">Panjapat</button>
        <button class="px-5 py-4 text-sm font-semibold text-gray-400 dark:text-gray-500 border-b-2 border-transparent whitespace-nowrap transition-all hover:text-gray-600 dark:hover:text-gray-300 [&.active]:text-brand-500 [&.active]:border-brand-500" onclick="showSection('candidate3')">Chariya</button>
        <button class="px-5 py-4 text-sm font-semibold text-gray-400 dark:text-gray-500 border-b-2 border-transparent whitespace-nowrap transition-all hover:text-gray-600 dark:hover:text-gray-300 [&.active]:text-brand-500 [&.active]:border-brand-500" onclick="showSection('candidate4')">Natchayada</button>
        <div class="w-px bg-gray-200 dark:bg-gray-700 my-2.5 mx-3"></div>
        <button class="px-8 py-4 text-base font-extrabold text-gray-400 dark:text-gray-500 border-b-3 border-transparent whitespace-nowrap transition-all hover:text-gray-600 dark:hover:text-gray-300 [&.active]:text-brand-500 [&.active]:border-brand-500 uppercase tracking-wide" onclick="showSection('summary')">Summary</button>
    </div>
</nav>

<!-- Main -->
<main class="max-w-7xl mx-auto px-4 md:px-12 py-8 pb-16 transition-colors">

    <!-- Observer Bar -->
    <div class="no-print bg-white/80 dark:bg-gray-900/80 backdrop-blur border border-gray-200 dark:border-gray-800 rounded-2xl p-6 md:p-7 mb-8 shadow-sm flex flex-col md:flex-row items-start md:items-center gap-4 transition-colors">
        <div class="w-11 h-11 bg-blue-50 dark:bg-brand-500/10 rounded-xl flex items-center justify-center text-brand-500 shrink-0">
            <span class="material-symbols-outlined">person</span>
        </div>
        <div class="flex-1">
            <label for="observerName" class="block text-sm font-bold text-gray-900 dark:text-gray-100 mb-0.5">Observer</label>
            <p class="text-xs text-gray-400 dark:text-gray-500">Select your name to begin</p>
        </div>
        <select class="w-full md:max-w-xs px-4 py-2.5 border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-800 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 transition appearance-none cursor-pointer" id="observerName">
            <option value="" disabled selected>Select observer...</option>
            <option value="Michael">Michael</option>
            <option value="Anek">Anek</option>
            <option value="Mark">Mark</option>
        </select>
        <button class="btn-start px-5 py-2.5 bg-brand-500 text-white text-sm font-semibold rounded-lg border border-brand-500 hover:bg-brand-600 transition" onclick="setObserver()">Begin</button>
    </div>

    <div id="evaluationArea" style="display:none;"></div>
</main>

<!-- Toast -->
<div id="toast" class="fixed bottom-7 right-7 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 px-6 py-3 rounded-xl text-sm font-semibold shadow-2xl transition-all duration-300 translate-y-20 opacity-0 z-[1000] [&.show]:translate-y-0 [&.show]:opacity-100"></div>

<script>
// ─── Firebase Init ───
firebase.initializeApp({
    apiKey: "AIzaSyDtOpcPanoHTEaxyidGgBxsRLPSOanBtPc",
    authDomain: "mbmth-hiring.firebaseapp.com",
    databaseURL: "https://mbmth-hiring-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "mbmth-hiring"
});
const db = firebase.database();
const dbRef = db.ref('evaluations');

const CATEGORIES = [
    { id: 'strategic', name: 'Strategic Thinking & Transformation', desc: 'Ability to develop and execute strategic initiatives, build business cases, and drive transformation roadmaps.', group: 'core' },
    { id: 'analytical', name: 'Analytical & Problem-Solving Skills', desc: 'Structured thinking, data-driven analysis, ability to synthesize complex information into actionable insights.', group: 'core' },
    { id: 'operational', name: 'Operational & Financial Excellence', desc: 'Understanding of KPIs, cost structures, production efficiency, budgets, and performance management.', group: 'core' },
    { id: 'delivery', name: 'Ability to Deliver Results', desc: 'Track record of driving measurable outcomes, meeting deadlines, and achieving targets under pressure.', group: 'core' },
    { id: 'communication', name: 'Communication & Presentation', desc: 'Executive-level presentation skills, clarity in English and Thai, ability to prepare decision papers.', group: 'interpersonal' },
    { id: 'project', name: 'Project Management & Execution', desc: 'Cross-functional coordination, structured tracking and reporting, ownership mindset.', group: 'interpersonal' },
    { id: 'leadership', name: 'Leadership Potential', desc: 'Vision, initiative, ability to influence and guide others, strategic decision-making capability.', group: 'interpersonal' },
    { id: 'cultural_fit', name: 'Cultural Fit & Team Adaptability', desc: 'Professional integrity, discretion, maturity, ability to integrate into and collaborate with the existing team, alignment with company values.', group: 'fit' },
    { id: 'sustainability', name: 'Sustainability & ESG Awareness', desc: 'Knowledge of ESG frameworks, energy efficiency, CO2 reduction, environmental compliance.', group: 'fit' }
];

const GROUPS = { core: 'Core Competencies', interpersonal: 'Communication & Leadership', fit: 'Fit & Awareness' };
const CANDIDATES = ['candidate1', 'candidate2', 'candidate3', 'candidate4'];
const CANDIDATE_LABELS = ['Krichasorn', 'Panjapat', 'Chariya', 'Natchayada'];
const COLORS = ['#1570ef', '#ef6820', '#17b26a', '#7a5af8'];

let currentSection = 'candidate1';
let observerName = '';
let cachedData = { observers: {} };
let saveTimer = null;

// ─── Migrate old localStorage ───
(function migrateLocalStorage() {
    const old = localStorage.getItem('mbmth_eval_data_v2') || localStorage.getItem('mbmth_eval_data');
    if (!old) return;
    try {
        const parsed = JSON.parse(old);
        if (parsed.observers && Object.keys(parsed.observers).length > 0) {
            Object.keys(parsed.observers).forEach(obsName => {
                const key = obsName.replace(/[.#$/\[\]]/g, '_');
                const obsData = parsed.observers[obsName];
                obsData.displayName = obsName;
                db.ref('evaluations/observers/' + key).once('value', snap => {
                    if (!snap.exists()) db.ref('evaluations/observers/' + key).set(obsData);
                });
            });
            localStorage.removeItem('mbmth_eval_data_v2');
            localStorage.removeItem('mbmth_eval_data');
        }
    } catch(e) {}
})();

function encodeObserverKey(name) { return name.replace(/[.#$/\[\]]/g, '_'); }

function pushToFirebase() {
    if (!observerName) return;
    const key = encodeObserverKey(observerName);
    const obsData = cachedData.observers[key];
    if (obsData) db.ref('evaluations/observers/' + key).set(obsData);
}

dbRef.on('value', (snapshot) => {
    const val = snapshot.val();
    cachedData = val || { observers: {} };
    if (!cachedData.observers) cachedData.observers = {};
    if (currentSection === 'summary') buildSummary();
    if (observerName) updateTabIndicators();
});

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleDark() {
    document.documentElement.classList.toggle('dark');
    const icon = document.querySelector('.dark-icon');
    if (document.documentElement.classList.contains('dark')) {
        icon.textContent = 'light_mode';
        localStorage.setItem('theme', 'dark');
    } else {
        icon.textContent = 'dark_mode';
        localStorage.setItem('theme', 'light');
    }
}
// Restore theme preference
if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.classList.add('dark');
    setTimeout(() => { const i = document.querySelector('.dark-icon'); if (i) i.textContent = 'light_mode'; }, 0);
}

function setObserver() {
    const select = document.getElementById('observerName');
    const name = select.value;
    if (!name) { showToast('Please select your name'); return; }
    observerName = name;
    document.getElementById('evaluationArea').style.display = 'block';
    select.disabled = true;
    const btn = document.querySelector('.btn-start');
    btn.textContent = 'Active';
    btn.disabled = true;
    btn.classList.add('opacity-50', 'cursor-not-allowed');
    buildSections();
    loadObserverData();
    showSection('candidate1');
    showToast('Welcome, ' + name + ' — syncing live');
}

function buildSections() {
    const area = document.getElementById('evaluationArea');
    let html = '';

    CANDIDATES.forEach((cid, ci) => {
        html += `<div class="section${ci === 0 ? ' active' : ''}" id="section-${cid}">`;
        html += `<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl mb-6 shadow-sm hover:shadow-md transition-all">`;
        html += `<div class="px-8 py-5 border-b border-gray-100 dark:border-gray-800/50 flex items-center justify-between"><h2 class="text-lg font-extrabold tracking-tight">${CANDIDATE_LABELS[ci]}</h2></div>`;
        html += `<div class="px-8 py-7">`;
        html += `<input type="hidden" id="name-${cid}" value="${CANDIDATE_LABELS[ci]}"/>`;

        let currentGroup = '';
        CATEGORIES.forEach(cat => {
            if (cat.group !== currentGroup) {
                currentGroup = cat.group;
                html += `<div class="text-[0.68rem] font-bold uppercase tracking-widest text-gray-400 dark:text-gray-500 pt-4 pb-2 border-b-2 border-gray-100 dark:border-gray-800 mb-1">${GROUPS[cat.group]}</div>`;
            }
            html += `<div class="grid grid-cols-1 lg:grid-cols-[260px_auto_1fr] gap-4 lg:gap-6 items-start py-4 border-b border-gray-50 dark:border-gray-800/50 last:border-0 hover:bg-gray-50/50 dark:hover:bg-gray-800/30 transition-colors lg:-mx-8 lg:px-8 rounded-lg">`;
            html += `<div><h3 class="text-[0.82rem] font-bold text-gray-900 dark:text-gray-100 mb-0.5">${cat.name}</h3><p class="text-[0.7rem] text-gray-400 dark:text-gray-500 leading-snug">${cat.desc}</p></div>`;
            html += `<div class="flex gap-1.5 pt-0.5" id="stars-${cid}-${cat.id}">`;
            for (let i = 1; i <= 5; i++) {
                html += `<div class="pill w-[38px] h-[34px] border-[1.5px] border-gray-200 rounded-lg flex items-center justify-center text-[0.78rem] font-bold cursor-pointer transition-all text-gray-400 bg-white hover:border-brand-500 hover:text-brand-500 hover:-translate-y-px hover:shadow-sm select-none" data-value="${i}" onclick="setRating('${cid}','${cat.id}',${i})">${i}</div>`;
            }
            html += `</div>`;
            html += `<textarea class="w-full px-3 py-2 border-[1.5px] border-gray-200 dark:border-gray-700 rounded-lg text-[0.78rem] text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-800 placeholder-gray-400 dark:placeholder-gray-600 resize-y min-h-[36px] focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 transition" id="comment-${cid}-${cat.id}" placeholder="Add comments..." oninput="debouncedSave()"></textarea>`;
            html += `</div>`;
        });

        html += `<div class="mt-6 pt-6 border-t-2 border-gray-100 dark:border-gray-800">`;
        html += `<label class="block text-sm font-bold text-gray-900 dark:text-gray-100 mb-1">Overall Assessment</label>`;
        html += `<p class="text-[0.7rem] text-gray-400 dark:text-gray-500 mb-2.5">Overall impression, recommendation, key strengths, concerns or red flags</p>`;
        html += `<textarea class="w-full px-4 py-3 border-[1.5px] border-gray-200 dark:border-gray-700 rounded-lg text-[0.82rem] text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-800 placeholder-gray-400 dark:placeholder-gray-600 resize-y min-h-[80px] focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 transition" id="overall-${cid}" placeholder="Write your overall assessment..." oninput="debouncedSave()"></textarea>`;
        html += `</div>`;

        html += `</div></div>`;
        html += `<div class="flex gap-3 justify-end mb-8">`;
        html += `<button class="px-5 py-2.5 bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400 text-sm font-semibold rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition" onclick="clearCandidate('${cid}')">Clear</button>`;
        html += `<button class="px-5 py-2.5 bg-brand-500 text-white text-sm font-semibold rounded-lg border border-brand-500 hover:bg-brand-600 transition" onclick="saveCandidate('${cid}')">Save Evaluation</button>`;
        html += `</div></div>`;
    });

    html += `<div class="section" id="section-summary"></div>`;
    area.innerHTML = html;
}

function setRating(cid, catId, value) {
    const container = document.getElementById(`stars-${cid}-${catId}`);
    container.querySelectorAll('.pill').forEach(s => {
        const v = parseInt(s.dataset.value);
        if (v <= value) s.classList.add('selected');
        else s.classList.remove('selected');
    });
    collectAndSave();
}

function getRating(cid, catId) {
    const container = document.getElementById(`stars-${cid}-${catId}`);
    if (!container) return 0;
    const selected = container.querySelectorAll('.pill.selected');
    return selected.length > 0 ? parseInt([...selected].pop().dataset.value) : 0;
}

function debouncedSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(collectAndSave, 600);
}

function collectAndSave() {
    if (!observerName) return;
    const key = encodeObserverKey(observerName);
    if (!cachedData.observers) cachedData.observers = {};
    if (!cachedData.observers[key]) cachedData.observers[key] = { timestamp: '', candidates: {} };

    CANDIDATES.forEach(cid => {
        const cData = { name: '', ratings: {}, comments: {}, overall: '' };
        const nameEl = document.getElementById(`name-${cid}`);
        if (nameEl) cData.name = nameEl.value;
        CATEGORIES.forEach(cat => {
            cData.ratings[cat.id] = getRating(cid, cat.id);
            const commentEl = document.getElementById(`comment-${cid}-${cat.id}`);
            if (commentEl) cData.comments[cat.id] = commentEl.value;
        });
        const overallEl = document.getElementById(`overall-${cid}`);
        if (overallEl) cData.overall = overallEl.value;
        cachedData.observers[key].candidates[cid] = cData;
    });

    cachedData.observers[key].timestamp = new Date().toISOString();
    cachedData.observers[key].displayName = observerName;
    pushToFirebase();
    updateTabIndicators();
}

function saveCandidate(cid) { collectAndSave(); showToast('Evaluation saved & synced'); }

function clearCandidate(cid) {
    if (!confirm('Clear all ratings and comments for this candidate?')) return;
    document.getElementById(`name-${cid}`).value = CANDIDATE_LABELS[CANDIDATES.indexOf(cid)];
    CATEGORIES.forEach(cat => {
        document.getElementById(`stars-${cid}-${cat.id}`).querySelectorAll('.pill').forEach(s => s.classList.remove('selected'));
        document.getElementById(`comment-${cid}-${cat.id}`).value = '';
    });
    document.getElementById(`overall-${cid}`).value = '';
    collectAndSave();
    showToast('Cleared');
}

function loadObserverData() {
    const key = encodeObserverKey(observerName);
    const obs = cachedData.observers?.[key];
    if (!obs) return;
    CANDIDATES.forEach(cid => {
        const c = obs.candidates?.[cid];
        if (!c) return;
        const nameEl = document.getElementById(`name-${cid}`);
        if (nameEl && c.name) nameEl.value = c.name;
        CATEGORIES.forEach(cat => {
            if (c.ratings?.[cat.id]) setRating(cid, cat.id, c.ratings[cat.id]);
            const commentEl = document.getElementById(`comment-${cid}-${cat.id}`);
            if (commentEl && c.comments?.[cat.id]) commentEl.value = c.comments[cat.id];
        });
        const overallEl = document.getElementById(`overall-${cid}`);
        if (overallEl && c.overall) overallEl.value = c.overall;
    });
    updateTabIndicators();
}

function updateTabIndicators() {
    const key = encodeObserverKey(observerName);
    const obs = cachedData.observers?.[key];
    const buttons = document.querySelectorAll('#nav button');
    CANDIDATES.forEach((cid, ci) => {
        let badge = buttons[ci].querySelector('.badge');
        if (!badge) { badge = document.createElement('span'); badge.className = 'badge'; buttons[ci].appendChild(badge); }
        if (!obs || !obs.candidates?.[cid]) { badge.className = 'badge'; return; }
        const c = obs.candidates[cid];
        const totalRatings = CATEGORIES.reduce((sum, cat) => sum + ((c.ratings?.[cat.id] || 0) > 0 ? 1 : 0), 0);
        if (totalRatings === CATEGORIES.length) badge.className = 'badge complete';
        else if (totalRatings > 0) badge.className = 'badge partial';
        else badge.className = 'badge';
    });
}

function showSection(sectionId) {
    currentSection = sectionId;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
    const idx = CANDIDATES.indexOf(sectionId);
    if (idx >= 0) {
        document.getElementById(`section-${sectionId}`).classList.add('active');
        document.querySelectorAll('#nav button')[idx].classList.add('active');
    } else if (sectionId === 'summary') {
        document.getElementById('section-summary').classList.add('active');
        const btns = document.querySelectorAll('#nav button');
        btns[btns.length - 1].classList.add('active');
        buildSummary();
    }
}

function getScoreColor(score) {
    if (score >= 4.5) return '#0e9f6e';
    if (score >= 3.5) return '#17b26a';
    if (score >= 2.5) return '#eaaa08';
    if (score >= 1.5) return '#ef6820';
    return '#f04438';
}

function buildSummary() {
    const data = cachedData;
    const container = document.getElementById('section-summary');
    if (!container) return;
    const observerKeys = Object.keys(data.observers || {});

    if (observerKeys.length === 0) {
        container.innerHTML = `<div class="text-center py-20"><div class="w-16 h-16 bg-gray-100 rounded-2xl inline-flex items-center justify-center mb-4 text-gray-400 text-3xl"><span class="material-symbols-outlined text-3xl">assessment</span></div><h3 class="text-lg font-bold text-gray-500 mb-1">No evaluations yet</h3><p class="text-sm text-gray-400">Complete at least one candidate evaluation to see the summary.</p></div>`;
        return;
    }

    const candidateScores = {};
    const candidateNames = {};

    CANDIDATES.forEach(cid => {
        candidateScores[cid] = {};
        CATEGORIES.forEach(cat => {
            const ratings = [];
            observerKeys.forEach(key => {
                const c = data.observers[key].candidates?.[cid];
                if (c && c.ratings?.[cat.id] > 0) ratings.push(c.ratings[cat.id]);
            });
            candidateScores[cid][cat.id] = ratings.length > 0 ? (ratings.reduce((a, b) => a + b, 0) / ratings.length) : 0;
        });
        observerKeys.forEach(key => {
            const c = data.observers[key].candidates?.[cid];
            if (c && c.name) candidateNames[cid] = c.name;
        });
    });

    const overallAvg = {};
    CANDIDATES.forEach(cid => {
        const scores = Object.values(candidateScores[cid]).filter(v => v > 0);
        overallAvg[cid] = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
    });

    const ranked = [...CANDIDATES].sort((a, b) => overallAvg[b] - overallAvg[a]);
    function getCandidateLabel(cid) { return candidateNames[cid] || CANDIDATE_LABELS[CANDIDATES.indexOf(cid)]; }
    function getObsDisplayName(key) { return data.observers[key].displayName || key; }

    let html = '';

    // Live indicator
    html += `<div class="flex items-center gap-2 mb-5"><span class="w-2 h-2 rounded-full bg-emerald-500" style="animation:pulse 2s infinite"></span><span class="text-xs font-semibold text-emerald-600">Live — updates in real time across all observers</span></div>`;

    // Top cards
    html += `<div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-6">`;

    // Ranking
    html += `<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-7 shadow-sm hover:shadow-md transition-all"><h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4">Candidate Ranking</h3>`;
    html += `<table class="w-full"><thead><tr class="text-[0.68rem] font-bold uppercase tracking-wider text-gray-400"><th class="text-left pb-3 px-3">Rank</th><th class="text-left pb-3 px-3">Candidate</th><th class="text-left pb-3 px-3">Avg Score</th><th class="text-left pb-3 px-3">Evaluations</th></tr></thead><tbody>`;
    ranked.forEach((cid, i) => {
        if (overallAvg[cid] === 0) return;
        const evalCount = observerKeys.filter(key => {
            const c = data.observers[key].candidates?.[cid];
            return c && Object.values(c.ratings || {}).some(r => r > 0);
        }).length;
        html += `<tr class="hover:bg-gray-50 transition"><td class="py-3 px-3"><span class="rank-badge rank-${i+1} w-8 h-8 rounded-lg inline-flex items-center justify-center font-extrabold text-xs">${i+1}</span></td><td class="py-3 px-3 font-bold text-sm">${getCandidateLabel(cid)}</td><td class="py-3 px-3"><span class="font-extrabold" style="color:${getScoreColor(overallAvg[cid])}">${overallAvg[cid].toFixed(2)}</span><span class="text-gray-400 text-xs"> / 5</span></td><td class="py-3 px-3 text-sm text-gray-500">${evalCount} observer${evalCount !== 1 ? 's' : ''}</td></tr>`;
    });
    html += `</tbody></table></div>`;

    // Observers
    html += `<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-7 shadow-sm hover:shadow-md transition-all"><h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4">Observers</h3>`;
    observerKeys.forEach(key => {
        const obs = data.observers[key];
        const ts = new Date(obs.timestamp);
        html += `<div class="flex items-center justify-between py-3 border-b border-gray-50 last:border-0"><span class="font-bold text-sm">${getObsDisplayName(key)}</span><span class="text-xs text-gray-400">${ts.toLocaleDateString()} ${ts.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div>`;
    });
    html += `<div class="flex gap-3 mt-4"><button class="px-4 py-2 bg-white text-gray-500 text-xs font-semibold rounded-lg border border-gray-200 hover:bg-gray-50 transition" onclick="exportData()">Export JSON</button><button class="px-4 py-2 bg-red-50 text-red-500 text-xs font-semibold rounded-lg border border-transparent hover:bg-red-100 transition" onclick="clearAllData()">Clear All Data</button></div></div>`;
    html += `</div>`;

    // Radar Chart
    html += `<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl mb-6 shadow-sm"><div class="px-8 py-5 border-b border-gray-100"><h2 class="text-base font-extrabold">Competency Comparison</h2></div><div class="p-8"><div class="chart-radar"><canvas id="radarChart"></canvas></div></div></div>`;

    // Bar Chart
    html += `<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl mb-6 shadow-sm"><div class="px-8 py-5 border-b border-gray-100"><h2 class="text-base font-extrabold">Score Breakdown by Category</h2></div><div class="p-8"><div class="max-h-[400px] relative"><canvas id="barChart"></canvas></div></div></div>`;

    // Per-candidate detail
    CANDIDATES.forEach((cid, ci) => {
        if (overallAvg[cid] === 0) return;

        html += `<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl mb-6 shadow-sm">`;
        html += `<div class="px-8 py-5 border-b border-gray-100 flex items-center justify-between"><h2 class="text-base font-extrabold flex items-center gap-2.5"><span class="w-2.5 h-2.5 rounded" style="background:${COLORS[ci]}"></span>${getCandidateLabel(cid)}</h2><span class="text-2xl font-extrabold" style="color:${getScoreColor(overallAvg[cid])}">${overallAvg[cid].toFixed(2)}</span></div>`;
        html += `<div class="px-8 py-7">`;

        CATEGORIES.forEach(cat => {
            const score = candidateScores[cid][cat.id];
            const pct = (score / 5 * 100).toFixed(0);
            html += `<div class="flex items-center gap-3 mb-2.5"><span class="text-xs font-semibold text-gray-500 w-[200px] shrink-0">${cat.name}</span><div class="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full transition-all duration-500" style="width:${pct}%;background:${getScoreColor(score)}"></div></div><span class="text-xs font-extrabold w-8 text-right" style="color:${getScoreColor(score)}">${score > 0 ? score.toFixed(1) : '–'}</span></div>`;
        });

        html += `<div class="mt-6"><h4 class="text-xs font-bold text-gray-500 mb-3">Comments from Observers</h4>`;
        let hasComments = false;

        observerKeys.forEach(key => {
            const c = data.observers[key].candidates?.[cid];
            if (!c) return;
            const dn = getObsDisplayName(key);
            CATEGORIES.forEach(cat => {
                if (c.comments?.[cat.id] && c.comments[cat.id].trim()) {
                    hasComments = true;
                    html += `<div class="bg-gray-50 dark:bg-gray-800/50 border border-gray-100 dark:border-gray-800 rounded-xl p-4 mb-2.5 hover:shadow-sm transition"><div class="text-[0.68rem] font-bold text-brand-500 uppercase tracking-wide mb-1">${dn} — ${cat.name}</div><div class="text-xs text-gray-500 leading-relaxed">${escapeHtml(c.comments[cat.id])}</div></div>`;
                }
            });
            if (c.overall && c.overall.trim()) {
                hasComments = true;
                html += `<div class="bg-blue-50 dark:bg-brand-500/10 border border-blue-100 dark:border-brand-500/20 border-l-[3px] border-l-brand-500 rounded-xl p-4 mb-2.5 hover:shadow-sm transition"><div class="text-[0.68rem] font-bold text-brand-500 uppercase tracking-wide mb-1">${dn} — Overall Assessment</div><div class="text-xs text-gray-500 leading-relaxed">${escapeHtml(c.overall)}</div></div>`;
            }
        });

        if (!hasComments) html += `<p class="text-xs text-gray-400">No comments yet.</p>`;
        html += `</div></div></div>`;
    });

    container.innerHTML = html;
    setTimeout(() => {
        buildRadarChart(candidateScores, candidateNames, overallAvg);
        buildBarChart(candidateScores, candidateNames, overallAvg);
    }, 50);
}

function buildRadarChart(scores, names, overallAvg) {
    const ctx = document.getElementById('radarChart');
    if (!ctx) return;
    const datasets = [];
    CANDIDATES.forEach((cid, ci) => {
        if (overallAvg[cid] === 0) return;
        datasets.push({
            label: names[cid] || CANDIDATE_LABELS[ci],
            data: CATEGORIES.map(cat => scores[cid][cat.id]),
            borderColor: COLORS[ci], backgroundColor: COLORS[ci] + '18',
            borderWidth: 3, pointRadius: 6, pointBackgroundColor: COLORS[ci],
            pointBorderColor: '#fff', pointBorderWidth: 2, pointHoverRadius: 8
        });
    });
    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: CATEGORIES.map(c => { const w = c.name.split(' '); if (w.length <= 3) return c.name; const m = Math.ceil(w.length/2); return [w.slice(0,m).join(' '), w.slice(m).join(' ')]; }),
            datasets
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: { r: { min: 0, max: 5, ticks: { stepSize: 1, font: { size: 13, family: 'Plus Jakarta Sans' }, backdropColor: 'transparent', z: 1 }, pointLabels: { font: { size: 14, family: 'Plus Jakarta Sans', weight: '700' }, color: '#1a1a2e', padding: 20 }, grid: { color: '#d0d5dd' }, angleLines: { color: '#d0d5dd' } } },
            plugins: { legend: { position: 'bottom', labels: { font: { size: 14, family: 'Plus Jakarta Sans', weight: '700' }, padding: 28, usePointStyle: true, pointStyle: 'rectRounded' } } }
        }
    });
}

function buildBarChart(scores, names, overallAvg) {
    const ctx = document.getElementById('barChart');
    if (!ctx) return;
    const datasets = [];
    CANDIDATES.forEach((cid, ci) => {
        if (overallAvg[cid] === 0) return;
        datasets.push({
            label: names[cid] || CANDIDATE_LABELS[ci],
            data: CATEGORIES.map(cat => scores[cid][cat.id]),
            backgroundColor: COLORS[ci] + 'CC', borderColor: COLORS[ci],
            borderWidth: 0, borderRadius: 6, borderSkipped: false
        });
    });
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: CATEGORIES.map(c => { const w = c.name.split(' '); if (w.length <= 2) return c.name; const m = Math.ceil(w.length/2); return [w.slice(0,m).join(' '), w.slice(m).join(' ')]; }),
            datasets
        },
        options: {
            responsive: true, maintainAspectRatio: true,
            scales: { y: { min: 0, max: 5, ticks: { stepSize: 1, font: { size: 11, family: 'Plus Jakarta Sans' } }, grid: { color: '#f0f2f5' } }, x: { ticks: { font: { size: 10, family: 'Plus Jakarta Sans', weight: '500' } }, grid: { display: false } } },
            plugins: { legend: { position: 'bottom', labels: { font: { size: 12, family: 'Plus Jakarta Sans', weight: '600' }, padding: 24, usePointStyle: true, pointStyle: 'rectRounded' } } }
        }
    });
}

function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function clearAllData() {
    if (!confirm('This will permanently delete ALL evaluation data from ALL observers. Are you sure?')) return;
    if (!confirm('Really delete everything? This cannot be undone.')) return;
    dbRef.remove();
    cachedData = { observers: {} };
    showToast('All data cleared');
    buildSummary();
}

function exportData() {
    const blob = new Blob([JSON.stringify(cachedData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `interview_evaluation_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Data exported');
}
</script>

</body>
</html>
